<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements | HabitFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/achievements.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="dark">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="zap" class="logo-icon"></i>
                    <span>HabitFlow</span>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="calendar.html" class="menu-item">
                    <i data-lucide="calendar"></i>
                    <span>Calendar</span>
                </a>
                <a href="reports.html" class="menu-item">
                    <i data-lucide="bar-chart-2"></i>
                    <span>Reports</span>
                </a>
                <a href="achievements.html" class="menu-item active">
                    <i data-lucide="award"></i>
                    <span>Achievements</span>
                </a>
                <a href="settings.html" class="menu-item">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-peek">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <p id="user-name">Adventurer</p>
                        <span id="user-level" class="badge">Lvl 1</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-greeting">
                    <h2>Achievements</h2>
                    <p class="date-text">Unlock professional badges as you progress.</p>
                </div>
            </header>

            <div class="badges-grid" id="badges-grid">
                <!-- Badges will be injected here -->
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/achievement.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
