<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar | HabitFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/calendar.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="dark">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="zap" class="logo-icon"></i>
                    <span>HabitFlow</span>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="calendar.html" class="menu-item active">
                    <i data-lucide="calendar"></i>
                    <span>Calendar</span>
                </a>
                <a href="reports.html" class="menu-item">
                    <i data-lucide="bar-chart-2"></i>
                    <span>Reports</span>
                </a>
                <a href="achievements.html" class="menu-item">
                    <i data-lucide="award"></i>
                    <span>Achievements</span>
                </a>
                <a href="settings.html" class="menu-item">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-peek">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <p id="user-name">Adventurer</p>
                        <span id="user-level" class="badge">Lvl 1</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-greeting">
                    <h2>Habit Calendar</h2>
                    <p class="date-text">Visualize your consistency across time.</p>
                </div>
            </header>

            <div class="calendar-card glass-card">
                <div class="calendar-header">
                    <button class="btn btn-outline" id="prev-month"><i data-lucide="chevron-left"></i></button>
                    <h3 id="calendar-month-year">October 2023</h3>
                    <button class="btn btn-outline" id="next-month"><i data-lucide="chevron-right"></i></button>
                </div>
                <div class="calendar-grid-header">
                    <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
                </div>
                <div class="calendar-grid" id="calendar-grid">
                    <!-- Days will be injected here -->
                </div>
                <div class="calendar-legend">
                    <div class="legend-item"><span class="day-dot perfect"></span> Perfect Day</div>
                    <div class="legend-item"><span class="day-dot partial"></span> Partial</div>
                    <div class="legend-item"><span class="day-dot none"></span> None</div>
                </div>
            </div>

            <!-- Details Panel (Hidden by default) -->
            <div id="day-details" class="day-details-panel glass-card" style="display: none;">
                <h4 id="details-date">October 1, 2023</h4>
                <div id="details-habit-list"></div>
            </div>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/calendar.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
