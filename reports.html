<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports | HabitFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/reports.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="dark">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i data-lucide="zap" class="logo-icon"></i>
                    <span>HabitFlow</span>
                </div>
            </div>
            <nav class="sidebar-menu">
                <a href="dashboard.html" class="menu-item">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </a>
                <a href="calendar.html" class="menu-item">
                    <i data-lucide="calendar"></i>
                    <span>Calendar</span>
                </a>
                <a href="reports.html" class="menu-item active">
                    <i data-lucide="bar-chart-2"></i>
                    <span>Reports</span>
                </a>
                <a href="achievements.html" class="menu-item">
                    <i data-lucide="award"></i>
                    <span>Achievements</span>
                </a>
                <a href="settings.html" class="menu-item">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-peek">
                    <div class="user-avatar">👤</div>
                    <div class="user-info">
                        <p id="user-name">Adventurer</p>
                        <span id="user-level" class="badge">Lvl 1</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-greeting">
                    <h2>Advanced Reports</h2>
                    <p class="date-text">Dive deep into your performance data.</p>
                </div>
            </header>

            <!-- Key Metrics -->
            <div class="metrics-grid">
                <div class="metric-card glass-card">
                    <p class="metric-label">Total Habits</p>
                    <h3 id="report-total-habits">0</h3>
                </div>
                <div class="metric-card glass-card">
                    <p class="metric-label">Success Rate</p>
                    <h3 id="report-success-rate">0%</h3>
                </div>
                <div class="metric-card glass-card">
                    <p class="metric-label">Best Streak</p>
                    <h3 id="report-best-streak">0</h3>
                </div>
                <div class="metric-card glass-card">
                    <p class="metric-label">Completed All-Time</p>
                    <h3 id="report-total-completions">0</h3>
                </div>
            </div>

            <div class="charts-container">
                <div class="chart-card glass-card">
                    <h3>Weekly Completion Trend</h3>
                    <canvas id="weeklyTrendChart"></canvas>
                </div>
                <div class="chart-card glass-card">
                    <h3>Category Breakdown</h3>
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <!-- Heatmap Section -->
            <section class="heatmap-section glass-card">
                <h3>Activity Heatmap</h3>
                <div id="heatmap-grid" class="heatmap-grid"></div>
                <div class="heatmap-footer">
                    <span>Less</span>
                    <div class="heatmap-legend">
                        <span class="level-0"></span>
                        <span class="level-1"></span>
                        <span class="level-2"></span>
                        <span class="level-3"></span>
                        <span class="level-4"></span>
                    </div>
                    <span>More</span>
                </div>
            </section>
        </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/report.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
